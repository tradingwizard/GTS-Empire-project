<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="chart-gradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0" />
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="line-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
  </defs>
  
  <!-- Background Grid -->
  <g stroke="rgba(0, 229, 255, 0.1)" stroke-width="1">
    <!-- Horizontal grid lines -->
    <line x1="0" y1="40" x2="400" y2="40" />
    <line x1="0" y1="80" x2="400" y2="80" />
    <line x1="0" y1="120" x2="400" y2="120" />
    <line x1="0" y1="160" x2="400" y2="160" />
    
    <!-- Vertical grid lines -->
    <line x1="50" y1="0" x2="50" y2="200" />
    <line x1="100" y1="0" x2="100" y2="200" />
    <line x1="150" y1="0" x2="150" y2="200" />
    <line x1="200" y1="0" x2="200" y2="200" />
    <line x1="250" y1="0" x2="250" y2="200" />
    <line x1="300" y1="0" x2="300" y2="200" />
    <line x1="350" y1="0" x2="350" y2="200" />
  </g>
  
  <!-- Price Chart -->
  <g>
    <!-- Area under the line chart -->
    <path d="M0,150 L25,140 L50,145 L75,130 L100,135 L125,120 L150,100 L175,110 L200,90 L225,70 L250,80 L275,60 L300,50 L325,70 L350,40 L375,60 L400,30 L400,200 L0,200 Z" 
          fill="url(#chart-gradient)" />
    
    <!-- Line chart -->
    <path d="M0,150 L25,140 L50,145 L75,130 L100,135 L125,120 L150,100 L175,110 L200,90 L225,70 L250,80 L275,60 L300,50 L325,70 L350,40 L375,60 L400,30" 
          stroke="url(#line-gradient)" stroke-width="2" fill="none" />
    
    <!-- Candlesticks -->
    <!-- Bullish candles (green) -->
    <rect x="45" y="143" width="10" height="15" fill="#00c853" />
    <line x1="50" y1="140" x2="50" y2="143" stroke="#00c853" stroke-width="2" />
    <line x1="50" y1="158" x2="50" y2="162" stroke="#00c853" stroke-width="2" />
    
    <rect x="95" y="130" width="10" height="20" fill="#00c853" />
    <line x1="100" y1="125" x2="100" y2="130" stroke="#00c853" stroke-width="2" />
    <line x1="100" y1="150" x2="100" y2="155" stroke="#00c853" stroke-width="2" />
    
    <rect x="195" y="85" width="10" height="15" fill="#00c853" />
    <line x1="200" y1="80" x2="200" y2="85" stroke="#00c853" stroke-width="2" />
    <line x1="200" y1="100" x2="200" y2="105" stroke="#00c853" stroke-width="2" />
    
    <rect x="295" y="45" width="10" height="15" fill="#00c853" />
    <line x1="300" y1="40" x2="300" y2="45" stroke="#00c853" stroke-width="2" />
    <line x1="300" y1="60" x2="300" y2="65" stroke="#00c853" stroke-width="2" />
    
    <!-- Bearish candles (red) -->
    <rect x="145" y="105" width="10" height="25" fill="#ff4949" />
    <line x1="150" y1="100" x2="150" y2="105" stroke="#ff4949" stroke-width="2" />
    <line x1="150" y1="130" x2="150" y2="135" stroke="#ff4949" stroke-width="2" />
    
    <rect x="245" y="85" width="10" height="20" fill="#ff4949" />
    <line x1="250" y1="80" x2="250" y2="85" stroke="#ff4949" stroke-width="2" />
    <line x1="250" y1="105" x2="250" y2="110" stroke="#ff4949" stroke-width="2" />
    
    <rect x="345" y="45" width="10" height="25" fill="#ff4949" />
    <line x1="350" y1="40" x2="350" y2="45" stroke="#ff4949" stroke-width="2" />
    <line x1="350" y1="70" x2="350" y2="75" stroke="#ff4949" stroke-width="2" />
  </g>
  
  <!-- Technical Indicators -->
  <g>
    <!-- Moving Average -->
    <path d="M0,140 L50,135 L100,130 L150,120 L200,110 L250,100 L300,90 L350,80 L400,70" 
          stroke="#9333ea" stroke-width="1.5" fill="none" stroke-dasharray="5,3" />
    
    <!-- Volume Bars -->
    <rect x="45" y="180" width="10" height="20" fill="rgba(0, 200, 83, 0.3)" />
    <rect x="95" y="185" width="10" height="15" fill="rgba(0, 200, 83, 0.3)" />
    <rect x="145" y="175" width="10" height="25" fill="rgba(255, 73, 73, 0.3)" />
    <rect x="195" y="190" width="10" height="10" fill="rgba(0, 200, 83, 0.3)" />
    <rect x="245" y="180" width="10" height="20" fill="rgba(255, 73, 73, 0.3)" />
    <rect x="295" y="188" width="10" height="12" fill="rgba(0, 200, 83, 0.3)" />
    <rect x="345" y="170" width="10" height="30" fill="rgba(255, 73, 73, 0.3)" />
  </g>
  
  <!-- Price Labels -->
  <g font-family="Arial" font-size="10" fill="#00e5ff">
    <text x="5" y="40">1.2500</text>
    <text x="5" y="80">1.2000</text>
    <text x="5" y="120">1.1500</text>
    <text x="5" y="160">1.1000</text>
  </g>
  
  <!-- Time Labels -->
  <g font-family="Arial" font-size="10" fill="#00e5ff">
    <text x="50" y="195">09:00</text>
    <text x="150" y="195">12:00</text>
    <text x="250" y="195">15:00</text>
    <text x="350" y="195">18:00</text>
  </g>
  
  <!-- Overlay Elements -->
  <g>
    <!-- Current Price Marker -->
    <circle cx="400" cy="30" r="4" fill="#00e5ff" />
    <text x="385" y="25" font-family="Arial" font-size="10" fill="#00e5ff" font-weight="bold">1.2650</text>
    
    <!-- Buy/Sell Markers -->
    <path d="M125,120 L125,110 L120,115 L125,110 L130,115 Z" fill="#00c853" />
    <path d="M275,60 L275,50 L270,55 L275,50 L280,55 Z" fill="#00c853" />
    <path d="M225,70 L225,60 L220,65 L225,60 L230,65 Z" fill="#ff4949" />
  </g>
</svg>